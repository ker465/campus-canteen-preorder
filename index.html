<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Canteen</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0f0d0b;
--card:#1a1612;
--border:#2e2820;
--amber:#f5a623;
--text:#f0e8dc;
--muted:#8a7d6b;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
border-bottom:1px solid var(--border);
}

.logo{
font-family:'Playfair Display',serif;
font-size:22px;
display:flex;
gap:6px;
align-items:center;
}

.logo span{
color:var(--amber);
}

.header-right{
display:flex;
gap:12px;
align-items:center;
}

.header-btn{
background:none;
border:1px solid #444;
color:#fff;
padding:6px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.header-btn:hover{
border-color:var(--amber);
}

.logout-btn{
background:var(--amber);
border:none;
color:#000;
padding:6px 14px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* MENU */
.menu-grid{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.menu-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
transition:.2s;
}

.menu-card:hover{
border-color:var(--amber);
transform:translateY(-3px);
}

.card-top{
display:flex;
gap:14px;
align-items:center;
}

.item-emoji{
font-size:28px;
}

.card-bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty-control{
display:flex;
border:1px solid var(--border);
border-radius:10px;
overflow:hidden;
}

.qty-btn{
background:none;
border:none;
color:#fff;
padding:6px 12px;
cursor:pointer;
}

.qty-display{
width:30px;
text-align:center;
}

/* CART */
.cart-panel{
margin:0 40px 50px;
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:28px;
}

.cart-panel h3{
margin-bottom:10px;
}

.order-btn{
margin-top:14px;
padding:10px 16px;
background:var(--amber);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

select{
margin-top:10px;
padding:6px;
border-radius:6px;
}

/* TOAST */
.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#1e1a14;
border:1px solid var(--amber);
padding:12px 20px;
border-radius:10px;
transition:.4s;
color:var(--text);
}
.toast.show{
transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<script>
// AUTH CHECK
if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "login.html";
}
if(!localStorage.getItem("selectedCanteen")){
    window.location.href = "choose.html";
}

const selectedCanteen = localStorage.getItem("selectedCanteen");
const user = JSON.parse(localStorage.getItem("user"));
</script>

<header>
    <div class="logo">
        🍽 Campus <span>Canteen</span> -
        <span id="canteenName"></span>
    </div>

    <div class="header-right">
        <span id="userName" style="font-size:13px;color:#aaa;"></span>
        <button class="header-btn" onclick="window.location.href='orders.html'">Orders</button>
        <button class="header-btn" onclick="window.location.href='choose.html'">Change</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<!-- MENU -->
<div class="menu-grid" id="menu"></div>

<!-- CART -->
<div class="cart-panel">
    <h3>Your Cart</h3>
    <div id="cart">Empty</div>
    <h2>Total: ₹<span id="total">0</span></h2>

    <select id="slot">
        <option>1:00 PM</option>
        <option>1:10 PM</option>
        <option>1:20 PM</option>
    </select>

    <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<div class="toast" id="toast"><span id="toastMsg">Order placed! 🎉</span></div>

<script>
// HEADER INFO
document.getElementById("canteenName").innerText = selectedCanteen;
if(user){
    document.getElementById("userName").innerText = "Hi, " + user.name;
}

// MENU DATA
const menus = {
    MRC: [
        { id: 1, name: "Veg Biryani",   price: 80, emoji: "🍛" },
        { id: 2, name: "Chicken Roll",  price: 60, emoji: "🌯" },
        { id: 3, name: "Samosa",        price: 15, emoji: "🥟" }
    ],
    Khuksi: [
        { id: 4, name: "Fried Rice",    price: 70, emoji: "🍚" },
        { id: 5, name: "Maggie",        price: 40, emoji: "🍜" },
        { id: 6, name: "Egg Puff",      price: 25, emoji: "🥐" }
    ]
};

const menuItems = menus[selectedCanteen] || [];
let quantities = {};
menuItems.forEach(i => quantities[i.id] = 0);

const menuDiv   = document.getElementById("menu");
const cartDiv   = document.getElementById("cart");
const totalSpan = document.getElementById("total");

// BUILD MENU
menuItems.forEach(item => {
    const card = document.createElement("div");
    card.className = "menu-card";
    card.innerHTML = `
        <div class="card-top">
            <div class="item-emoji">${item.emoji}</div>
            <div>
                <div>${item.name}</div>
                <div>₹${item.price}</div>
            </div>
        </div>
        <div class="card-bottom">
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                <div class="qty-display" id="qty-${item.id}">0</div>
                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
        </div>
    `;
    menuDiv.appendChild(card);
});

// CART LOGIC
function changeQty(id, delta) {
    quantities[id] = Math.max(0, quantities[id] + delta);
    document.getElementById(`qty-${id}`).innerText = quantities[id];
    updateCart();
}

function updateCart() {
    let total = 0;
    let html = "";
    menuItems.forEach(i => {
        if(quantities[i.id] > 0){
            let itemTotal = quantities[i.id] * i.price;
            total += itemTotal;
            html += `${i.name} × ${quantities[i.id]} = ₹${itemTotal}<br>`;
        }
    });
    cartDiv.innerHTML = html || "Empty";
    totalSpan.innerText = total;
}

// TOAST HELPER
function showToast(msg) {
    document.getElementById("toastMsg").innerText = msg;
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

// PLACE ORDER — saves pending order and goes to payment
function placeOrder() {
    const orderedItems = menuItems.filter(i => quantities[i.id] > 0).map(i => ({
        name:     i.name,
        quantity: quantities[i.id],
        price:    i.price
    }));

    if(orderedItems.length === 0) {
        showToast("Add items to your cart first! 🛒");
        return;
    }

    const slot  = document.getElementById("slot").value;
    const total = orderedItems.reduce((s, i) => s + i.price * i.quantity, 0);

    // Save as pending — token is assigned after payment confirmed
    localStorage.setItem("pendingOrder", JSON.stringify({
        canteen: selectedCanteen,
        items:   orderedItems,
        total:   total,
        slot:    slot,
        date:    new Date().toLocaleString()
    }));

    window.location.href = "payment.html";
}

function logout() {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("selectedCanteen");
    window.location.href = "login.html";
}
</script>

</body>
</html>
