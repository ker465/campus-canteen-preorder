<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Campus Canteen</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0d0b;
            --surface: #1a1612;
            --card: #221e19;
            --border: #2e2820;
            --amber: #f5a623;
            --amber-dark: #c47f0a;
            --amber-glow: rgba(245, 166, 35, 0.15);
            --text: #f0e8dc;
            --muted: #8a7d6b;
            --error: #ef5350;
            --error-glow: rgba(239, 83, 80, 0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            opacity: 0.5;
        }

        /* ── HEADER ─────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,13,11,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 68px;
        }

        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--amber);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--text); }
        .logo span { color: var(--amber); }

        /* ── MAIN ─────────────────────────── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.45s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-eyebrow {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-eyebrow::before, .form-eyebrow::after {
            content: '';
            width: 20px; height: 1px;
            background: var(--amber-dark);
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 6px;
            line-height: 1.1;
        }

        .form-subtitle {
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 32px;
        }

        /* ── FIELDS ─────────────────────────── */
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 1rem;
            pointer-events: none;
            opacity: 0.55;
        }

        input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: #e8c07a;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            padding: 12px 14px 12px 40px;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: var(--muted); }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 60px var(--surface) inset !important;
            -webkit-text-fill-color: #e8c07a !important;
            caret-color: #e8c07a;
        }

        input:focus {
            border-color: var(--amber);
            box-shadow: 0 0 0 3px var(--amber-glow);
        }

        input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px var(--error-glow);
        }

        input.has-toggle { padding-right: 44px; }

        .field-error {
            font-size: 0.75rem;
            color: var(--error);
            display: none;
        }
        .field-error.show { display: block; }

        .toggle-pass {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: var(--text); }

        /* ── SUBMIT ─────────────────────────── */
        .submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            background: var(--amber);
            color: #0f0d0b;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #ffb83f;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 166, 35, 0.35);
        }

        .submit-btn:active { transform: translateY(0); box-shadow: none; }

        /* ── DIVIDER ─────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span { font-size: 0.75rem; color: var(--muted); }

        /* ── FOOTER ─────────────────────────── */
        .form-footer {
            text-align: center;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .form-footer a {
            color: var(--amber);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .form-footer a:hover { color: #ffb83f; }

        /* ── TOAST ─────────────────────────── */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e1a14;
            border: 1px solid var(--amber);
            color: var(--text);
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 500px) {
            header { padding: 0 16px; }
            .form-card { padding: 28px 20px; border-radius: 20px; }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="#">
        <div class="logo-icon">🍽</div>
        <h1>Campus <span>Canteen</span></h1>
    </a>
</header>

<main>
    <div class="form-card">
        <div class="form-eyebrow">Welcome back</div>
        <div class="form-title">Log in</div>
        <p class="form-subtitle">Order your meal, skip the queue</p>

        <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
                <span class="input-icon">✉️</span>
                <input id="email" type="email" placeholder="you@college.edu">
            </div>
            <span class="field-error" id="emailErr">Enter a valid email address</span>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input id="password" type="password" placeholder="Your password" class="has-toggle">
                <button class="toggle-pass" type="button" onclick="togglePass()" id="toggleBtn">👁</button>
            </div>
            <span class="field-error" id="passErr">Please enter your password</span>
        </div>

        <div style="text-align:right;margin-bottom:4px;margin-top:-6px">
            <a href="forgot-password.html" style="font-size:0.78rem;color:var(--muted);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='var(--amber)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
        </div>

        <button class="submit-btn" onclick="login()">
            Log In →
        </button>

        <div class="divider"><span>new here?</span></div>

        <div class="form-footer">
            <a href="signup.html">Create a free account</a>
        </div>
    </div>
</main>

<div class="toast" id="toast">
    <span id="toastIcon">✅</span>
    <span id="toastMsg">Logged in!</span>
</div>

<script src="auth.js"></script>
<script>
    // Enter key support
    document.addEventListener('keydown', function(e) {
        if(e.key === 'Enter') login();
    });

    function togglePass() {
        const input = document.getElementById('password');
        const btn   = document.getElementById('toggleBtn');
        input.type  = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function showToast(msg, success = true) {
        document.getElementById('toastIcon').textContent = success ? '✅' : '❌';
        document.getElementById('toastMsg').textContent  = msg;
        const toast = document.getElementById('toast');
        toast.style.borderColor = success ? 'var(--amber)' : 'var(--error)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function clearErrors() {
        ['email', 'password'].forEach(id => {
            document.getElementById(id).classList.remove('error');
        });
        document.querySelectorAll('.field-error').forEach(el => el.classList.remove('show'));
    }

    function login() {
        clearErrors();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        let valid = true;

        if (!email || !/\S+@\S+\.\S+/.test(email)) {
            document.getElementById('email').classList.add('error');
            document.getElementById('emailErr').classList.add('show');
            valid = false;
        }

        if (!password) {
            document.getElementById('password').classList.add('error');
            document.getElementById('passErr').classList.add('show');
            valid = false;
        }

        if (!valid) return;

        handleLogin(email, password);
    }
</script>
</body>
</html>
