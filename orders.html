<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders · Campus Canteen</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0d0b;
            --surface: #1a1612;
            --card: #221e19;
            --border: #2e2820;
            --amber: #f5a623;
            --amber-dark: #c47f0a;
            --amber-glow: rgba(245, 166, 35, 0.15);
            --text: #f0e8dc;
            --muted: #8a7d6b;
            --green: #4caf80;
            --green-glow: rgba(76, 175, 128, 0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            opacity: 0.5;
        }

        /* ── HEADER ─────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,13,11,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }

        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--amber);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        .logo span { color: var(--amber); }

        .header-actions { display: flex; gap: 10px; }

        .hdr-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .hdr-btn:hover { border-color: var(--amber); color: var(--text); }

        .hdr-btn.logout {
            background: var(--amber);
            border-color: var(--amber);
            color: #0f0d0b;
            font-weight: 700;
        }
        .hdr-btn.logout:hover { background: #ffb83f; border-color: #ffb83f; color: #0f0d0b; }

        /* ── PAGE TITLE ─────────────────────────── */
        .page-hero {
            padding: 40px 32px 24px;
        }

        .page-eyebrow {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-eyebrow::before, .page-eyebrow::after {
            content: '';
            width: 20px; height: 1px;
            background: var(--amber-dark);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 900;
        }

        /* ── SECTION LABEL ─────────────────────────── */
        .section-label {
            padding: 0 32px 14px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .section-label span {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── ORDERS LIST ─────────────────────────── */
        .orders-list {
            padding: 0 32px 48px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── EMPTY STATE ─────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 72px 32px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .order-now-btn {
            display: inline-block;
            padding: 12px 28px;
            background: var(--amber);
            color: #0f0d0b;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
        }
        .order-now-btn:hover { background: #ffb83f; transform: translateY(-2px); }

        /* ── ORDER CARD ─────────────────────────── */
        .order-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            animation: fadeUp 0.35s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            padding: 20px 24px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .order-id {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .token-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--amber-glow);
            border: 1px solid var(--amber-dark);
            color: var(--amber);
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }

        .token-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .order-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .meta-chip {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .card-right {
            text-align: right;
            flex-shrink: 0;
        }

        .order-date {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .status-badge.preparing {
            background: rgba(245, 166, 35, 0.12);
            color: var(--amber);
            border: 1px solid rgba(245,166,35,0.25);
        }

        .status-badge.ready {
            background: var(--green-glow);
            color: var(--green);
            border: 1px solid rgba(76,175,128,0.25);
        }

        .status-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ── ITEMS ─────────────────────────── */
        .card-items {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-qty {
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--surface);
            padding: 1px 8px;
            border-radius: 10px;
        }

        .item-price {
            font-size: 0.88rem;
            color: var(--muted);
        }

        /* ── CARD FOOTER ─────────────────────────── */
        .card-footer {
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .payment-method {
            font-size: 0.78rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .total-amount {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .total-amount sup {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
        }

        /* ── RESPONSIVE ─────────────────────────── */
        @media (max-width: 600px) {
            header { padding: 0 16px; }
            .page-hero, .section-label { padding-left: 16px; padding-right: 16px; }
            .orders-list { padding: 0 16px 40px; }
            .card-top { flex-direction: column; }
            .card-right { text-align: left; }
        }

        /* ── TOKEN STATUS BOARD ─────────────────────────── */
        .token-board {
            display: flex;
            border-top: 1px solid var(--border);
        }

        .token-cell {
            flex: 1;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            border-right: 1px solid var(--border);
        }

        .token-cell:last-child { border-right: none; }

        .token-cell-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .token-cell-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--muted);
        }

        .token-cell.mine  .token-cell-value { color: var(--amber); font-size: 1.5rem; }
        .token-cell.ahead .token-cell-value { color: var(--text); }
    </style>
</head>
<body>

<script>
    if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "login.html";
    }
</script>

<header>
    <div class="logo">
        <div class="logo-icon">🍽</div>
        <h1>Campus <span>Canteen</span></h1>
    </div>
    <div class="header-actions">
        <button class="hdr-btn" onclick="window.location.href='choose.html'">← Order Again</button>
        <button class="hdr-btn logout" onclick="logout()">Log out</button>
    </div>
</header>

<div class="page-hero">
    <div class="page-eyebrow">History</div>
    <div class="page-title">My Orders</div>
</div>

<div class="section-label"><span>Recent</span></div>

<div class="orders-list" id="ordersList"></div>

<script>
    const list   = document.getElementById("ordersList");
    const orders = JSON.parse(localStorage.getItem("orders")) || [];

    if (orders.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <span class="empty-icon">🍴</span>
                <h3>No orders yet</h3>
                <p>Looks like you haven't ordered anything yet.</p>
                <a class="order-now-btn" href="choose.html">Order Now →</a>
            </div>`;
    } else {
        [...orders].reverse().forEach((order, i) => {
            const itemsHTML = order.items.map(item => `
                <div class="item-row">
                    <div class="item-name">
                        ${item.name}
                        <span class="item-qty">× ${item.quantity}</span>
                    </div>
                    <div class="item-price">₹${item.price * item.quantity}</div>
                </div>`).join('');

            const isReady   = order.orderStatus?.toLowerCase() === 'ready';
            const statusCls = isReady ? 'ready' : 'preparing';
            const statusTxt = order.orderStatus || 'Preparing';

            const card = document.createElement("div");
            card.className = "order-card";
            card.style.animationDelay = `${i * 0.06}s`;
            const servingKey  = `serving_${order.canteen}`;
            const nowServing  = parseInt(localStorage.getItem(servingKey) || "1");
            const ordersAhead = Math.max(0, order.tokenNumber - nowServing);

            card.innerHTML = `
                <div class="card-top">
                    <div>
                        <div class="order-id">${order.orderID || 'Order'}</div>
                        <div class="token-badge">
                            <span class="token-label">Token</span>
                            ${order.tokenNumber}
                        </div>
                        <div class="order-meta-row">
                            <span class="meta-chip">🏫 ${order.canteen}</span>
                            <span class="meta-chip">⏱ ${order.slot}</span>
                        </div>
                    </div>
                    <div class="card-right">
                        <div class="order-date">${order.date}</div>
                        <div class="status-badge ${statusCls}">${statusTxt}</div>
                    </div>
                </div>
                <div class="card-items">${itemsHTML}</div>
                <div class="token-board">
                    <div class="token-cell">
                        <div class="token-cell-label">Now Serving</div>
                        <div class="token-cell-value">${nowServing}</div>
                    </div>
                    <div class="token-cell mine">
                        <div class="token-cell-label">Your Token</div>
                        <div class="token-cell-value">${order.tokenNumber}</div>
                    </div>
                    <div class="token-cell ahead">
                        <div class="token-cell-label">Orders Ahead</div>
                        <div class="token-cell-value">${ordersAhead}</div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="payment-method">💳 ${order.paymentMethod || 'Cash'}</div>
                    <div class="total-amount"><sup>₹</sup>${order.total}</div>
                </div>`;
            list.appendChild(card);
        });
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("selectedCanteen");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
