<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password · Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f6fb; --white: #fff; --border: #eef0f7;
            --text: #2d2d3a; --muted: #9b9bb4; --light: #f0f1f8;
            --pink: #f8719a; --pink2: #f4436c; --pink-light: rgba(248,113,154,0.10);
            --blue: #5b8dee; --blue2: #3a6fd8; --blue-light: rgba(91,141,238,0.10);
            --grad-pink: linear-gradient(135deg,#f8719a,#f4436c);
            --grad-blue: linear-gradient(135deg,#7eb3f8,#5b8dee);
            --grad-green: linear-gradient(135deg,#4ade80,#22c55e);
            --shadow: 0 4px 24px rgba(100,100,140,0.10);
            --shadow-lg: 0 12px 48px rgba(100,100,140,0.18);
            --green: #22c55e;
        }

        body.dark {
            --bg: #0f0e13; --white: #1a1825; --border: #2a2740;
            --text: #f0eaf8; --muted: #6e6a8a; --light: #221f32;
            --pink-light: rgba(248,113,154,0.13);
            --blue-light: rgba(91,141,238,0.13);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.55);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            transition: background 0.3s, color 0.3s;
        }

        /* BG BLOBS */
        .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: blobFloat 8s ease-in-out infinite; }
        .blob-1 { width: 400px; height: 400px; background: rgba(248,113,154,0.12); top: -100px; right: -100px; }
        .blob-2 { width: 300px; height: 300px; background: rgba(91,141,238,0.10); bottom: -80px; left: -80px; animation-delay: -4s; }
        body.dark .blob-1 { background: rgba(248,113,154,0.07); }
        body.dark .blob-2 { background: rgba(91,141,238,0.07); }

        /* THEME TOGGLE */
        .theme-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            width: 44px; height: 44px; border-radius: 13px;
            border: 1.5px solid var(--border); background: var(--white);
            cursor: pointer; font-size: 1.15rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .theme-btn:hover { transform: rotate(20deg) scale(1.12); border-color: var(--pink); }

        .wrapper { position: relative; z-index: 1; width: 100%; max-width: 460px; }

        /* HEADER */
        .header { text-align: center; margin-bottom: 32px; animation: fadeDown 0.5s ease both; }
        .header-logo {
            width: 64px; height: 64px; background: var(--grad-pink);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 14px;
            box-shadow: 0 8px 28px rgba(248,113,154,0.35);
            animation: popIn 0.6s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 5px; }
        .header p  { font-size: 0.85rem; color: var(--muted); }

        /* CANTEEN TABS */
        .canteen-tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            background: var(--light); border-radius: 14px; padding: 5px;
        }
        .tab-btn {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 800;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            background: transparent; color: var(--muted);
        }
        .tab-btn.active-mrc    { background: var(--grad-pink); color: #fff; box-shadow: 0 4px 14px rgba(248,113,154,0.35); }
        .tab-btn.active-khuksi { background: var(--grad-blue); color: #fff; box-shadow: 0 4px 14px rgba(91,141,238,0.35); }
        .tab-btn:not(.active-mrc):not(.active-khuksi):hover { background: var(--white); color: var(--text); }

        /* FORM CARD */
        .form-card {
            background: var(--white); border-radius: 22px;
            box-shadow: var(--shadow-lg); overflow: hidden;
            animation: fadeUp 0.4s ease both;
        }

        .card-top {
            padding: 22px 28px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .canteen-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.8rem; font-weight: 800;
            padding: 5px 14px; border-radius: 20px;
        }
        .badge-mrc    { background: var(--pink-light); color: var(--pink2); }
        .badge-khuksi { background: var(--blue-light);  color: var(--blue2); }

        .card-top h2 { font-size: 1.15rem; font-weight: 900; }

        .card-body { padding: 24px 28px 28px; }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .form-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }

        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%); font-size: 0.9rem; pointer-events: none;
        }
        input {
            width: 100%; background: var(--light); border: 1.5px solid var(--border);
            color: var(--text); font-family: 'Nunito', sans-serif;
            font-size: 0.9rem; font-weight: 500;
            padding: 12px 40px 12px 38px; border-radius: 12px; outline: none;
            transition: all 0.22s;
        }
        input::placeholder { color: var(--muted); }
        input:focus { background: var(--white); transform: translateY(-1px); }
        input.focus-mrc:focus    { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(248,113,154,0.15); }
        input.focus-khuksi:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(91,141,238,0.15); }
        input.input-error { border-color: var(--pink2) !important; box-shadow: 0 0 0 3px rgba(244,67,108,0.12) !important; }

        .toggle-pass {
            position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 0.88rem; color: var(--muted); padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: var(--text); }

        .field-err { font-size: 0.74rem; font-weight: 700; color: var(--pink2); min-height: 16px; margin-top: 2px; }

        /* PASSWORD STRENGTH */
        .strength-bar { height: 5px; border-radius: 3px; background: var(--border); margin-top: 7px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 3px; transition: width 0.35s, background 0.35s; width: 0; }
        .strength-label { font-size: 0.7rem; font-weight: 700; margin-top: 4px; min-height: 14px; }

        /* SAVE BUTTON */
        .save-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            color: white; font-family: 'Nunito', sans-serif;
            font-size: 0.95rem; font-weight: 800;
            cursor: pointer; margin-top: 8px;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .save-btn:hover  { transform: translateY(-2px); }
        .save-btn:active { transform: scale(0.97); }
        .save-btn.btn-mrc    { background: var(--grad-pink); box-shadow: 0 5px 18px rgba(248,113,154,0.38); }
        .save-btn.btn-khuksi { background: var(--grad-blue); box-shadow: 0 5px 18px rgba(91,141,238,0.38); }
        .save-btn:disabled   { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* SUCCESS STATE */
        .success-overlay {
            display: none; text-align: center; padding: 32px 20px;
            animation: fadeUp 0.4s ease both;
        }
        .success-overlay.show { display: block; }
        .success-icon {
            width: 72px; height: 72px; background: var(--grad-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 16px;
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
            box-shadow: 0 8px 24px rgba(34,197,94,0.35);
        }
        .success-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 6px; }
        .success-sub   { font-size: 0.84rem; color: var(--muted); margin-bottom: 24px; }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.8rem; font-weight: 700; color: var(--muted);
            cursor: pointer; background: none; border: none;
            font-family: 'Nunito', sans-serif; padding: 0;
            transition: color 0.2s, transform 0.2s; margin-bottom: 20px;
        }
        .back-link:hover { color: var(--text); transform: translateX(-3px); }

        .divider { height: 1px; background: var(--border); margin: 6px 0 18px; }

        /* ── SECURITY QUESTION SECTION ── */
        .section-divider {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0 20px;
        }
        .section-divider::before, .section-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .section-divider span {
            font-size: 0.72rem; font-weight: 800; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap;
        }
        .sq-info {
            background: var(--amber-light, rgba(245,166,35,0.08));
            border: 1px solid rgba(245,166,35,0.22);
            border-radius: 12px; padding: 11px 14px;
            font-size: 0.76rem; font-weight: 600; color: var(--text);
            margin-bottom: 16px; display: flex; gap: 9px; align-items: flex-start; line-height: 1.5;
        }
        .sq-current {
            background: var(--light); border-radius: 10px;
            padding: 10px 13px; margin-bottom: 14px;
            font-size: 0.78rem; font-weight: 600; color: var(--muted);
            border: 1px solid var(--border);
        }
        .sq-current strong { color: var(--text); display: block; margin-top: 2px; font-size: 0.82rem; }
        .sq-save-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            color: white; font-family: 'Nunito', sans-serif;
            font-size: 0.9rem; font-weight: 800; cursor: pointer; margin-top: 4px;
            background: linear-gradient(135deg,#fbbf24,#f5a623);
            box-shadow: 0 4px 14px rgba(245,166,35,0.35);
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .sq-save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.45); }
        .sq-save-btn:active { transform: scale(0.97); }
        .sq-success { font-size:0.74rem;font-weight:700;color:#22c55e;text-align:center;margin-top:8px;min-height:16px; }
        .sq-err     { font-size:0.74rem;font-weight:700;color:var(--pink2);min-height:16px;margin-top:2px; }

        @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes popIn    { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
        @keyframes blobFloat{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.05)} }
        @keyframes shake    { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    </style>
</head>
<body>
<script>(function(){ if(localStorage.getItem("adminTheme")==="dark") document.body.classList.add("dark"); })()</script>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>

<div class="wrapper">

    <div class="header">
        <div class="header-logo">🔐</div>
        <h1>Change Password</h1>
        <p>Update your admin login password</p>
    </div>

    <!-- CANTEEN TABS -->
    <div class="canteen-tabs">
        <button class="tab-btn" id="tabMRC"    onclick="switchCanteen('MRC')">🏫 MRC Canteen</button>
        <button class="tab-btn" id="tabKhuksi" onclick="switchCanteen('Khuksi')">🍜 Khuksi Corner</button>
    </div>

    <!-- FORM CARD -->
    <div class="form-card">

        <div class="card-top">
            <div class="canteen-badge" id="canteenBadge">🏫 MRC Canteen</div>
        </div>

        <div class="card-body">
            <button class="back-link" onclick="window.location.href='admin-login.html'">← Back to Login</button>
            <div class="divider"></div>

            <!-- FORM -->
            <div id="formSection">
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input id="cpCurrent" type="password" placeholder="Enter current password">
                        <button class="toggle-pass" onclick="toggleVis('cpCurrent', this)">👁</button>
                    </div>
                    <div class="field-err" id="errCurrent"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">✏️</span>
                        <input id="cpNew" type="password" placeholder="Min. 4 characters" oninput="checkStrength(this.value)">
                        <button class="toggle-pass" onclick="toggleVis('cpNew', this)">👁</button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">✅</span>
                        <input id="cpConfirm" type="password" placeholder="Repeat new password">
                        <button class="toggle-pass" onclick="toggleVis('cpConfirm', this)">👁</button>
                    </div>
                    <div class="field-err" id="errConfirm"></div>
                </div>

                <button class="save-btn btn-mrc" id="saveBtn" onclick="savePassword()">
                    Save New Password →
                </button>

            </div>

            <!-- SUCCESS -->
            <div class="success-overlay" id="successSection">
                <div class="success-icon">✅</div>
                <div class="success-title">Password Updated!</div>
                <div class="success-sub" id="successMsg">Your password has been changed successfully.</div>
                <button class="save-btn btn-mrc" id="successBtn" onclick="window.location.href='admin-login.html'" style="max-width:220px;margin:0 auto;display:block">
                    Back to Login →
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    // ── Base credentials ──────────────────────────────────────
    const BASE_CREDS = {
        MRC:    { username: "mrcadmin",    password: "123" },
        Khuksi: { username: "khuksiadmin", password: "123" }
    };

    function getCreds(canteen) {
        var base    = BASE_CREDS[canteen];
        var savedPwd = localStorage.getItem("adminPwd_" + canteen);
        return { username: base.username, password: savedPwd || base.password };
    }

    // ── Active canteen state ──────────────────────────────────
    var activeCanteen = localStorage.getItem("changePwdCanteen") || "MRC";

    function switchCanteen(canteen) {
        activeCanteen = canteen;
        localStorage.setItem("changePwdCanteen", canteen);

        // Tabs
        document.getElementById("tabMRC").className    = "tab-btn" + (canteen === "MRC"    ? " active-mrc"    : "");
        document.getElementById("tabKhuksi").className = "tab-btn" + (canteen === "Khuksi" ? " active-khuksi" : "");

        // Badge
        var badge = document.getElementById("canteenBadge");
        badge.textContent = canteen === "MRC" ? "🏫 MRC Canteen" : "🍜 Khuksi Corner";
        badge.className   = "canteen-badge " + (canteen === "MRC" ? "badge-mrc" : "badge-khuksi");

        // Input focus class
        var focusCls = canteen === "MRC" ? "focus-mrc" : "focus-khuksi";
        ["cpCurrent","cpNew","cpConfirm"].forEach(function(id) {
            var el = document.getElementById(id);
            el.className = focusCls;
        });

        // Button color
        var btn = document.getElementById("saveBtn");
        btn.className = "save-btn " + (canteen === "MRC" ? "btn-mrc" : "btn-khuksi");
        var sucBtn = document.getElementById("successBtn");
        sucBtn.className = "save-btn " + (canteen === "MRC" ? "btn-mrc" : "btn-khuksi");

        // Reset form
        clearForm();
        document.getElementById("formSection").style.display    = "block";
        document.getElementById("successSection").classList.remove("show");
        loadCurrentSQ();
        document.getElementById("sqErr").textContent     = "";
        document.getElementById("sqSuccess").textContent = "";
        document.getElementById("sqQuestion").value      = "";
        document.getElementById("sqAnswer").value        = "";
    }

    function clearForm() {
        ["cpCurrent","cpNew","cpConfirm"].forEach(function(id){ document.getElementById(id).value = ""; });
        ["errCurrent","errConfirm"].forEach(function(id){ document.getElementById(id).textContent = ""; });
        ["cpCurrent","cpNew","cpConfirm"].forEach(function(id){ document.getElementById(id).classList.remove("input-error"); });
        document.getElementById("strengthFill").style.width      = "0";
        document.getElementById("strengthFill").style.background = "";
        document.getElementById("strengthLabel").textContent     = "";
    }

    // ── Password strength ─────────────────────────────────────
    function checkStrength(val) {
        var fill  = document.getElementById("strengthFill");
        var label = document.getElementById("strengthLabel");
        if (!val) { fill.style.width = "0"; label.textContent = ""; return; }

        var score = 0;
        if (val.length >= 4)  score++;
        if (val.length >= 8)  score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        var levels = [
            { pct: "20%", color: "#ef5350", text: "Weak",      textColor: "#ef5350" },
            { pct: "40%", color: "#ff9800", text: "Fair",      textColor: "#ff9800" },
            { pct: "60%", color: "#fdd835", text: "Good",      textColor: "#8a7d00" },
            { pct: "80%", color: "#66bb6a", text: "Strong",    textColor: "#2e7d32" },
            { pct:"100%", color: "#22c55e", text: "Very Strong", textColor: "#166534" }
        ];
        var L = levels[Math.min(score - 1, 4)] || levels[0];
        fill.style.width      = L.pct;
        fill.style.background = L.color;
        label.textContent     = L.text;
        label.style.color     = L.textColor;
    }

    // ── Save password ─────────────────────────────────────────
    function savePassword() {
        var current = document.getElementById("cpCurrent").value;
        var newPwd  = document.getElementById("cpNew").value;
        var confirm = document.getElementById("cpConfirm").value;

        // Clear errors
        ["errCurrent","errConfirm"].forEach(function(id){ document.getElementById(id).textContent = ""; });
        ["cpCurrent","cpNew","cpConfirm"].forEach(function(id){ document.getElementById(id).classList.remove("input-error"); });

        var valid = true;

        var cred = getCreds(activeCanteen);
        if (current !== cred.password) {
            document.getElementById("errCurrent").textContent = "Current password is incorrect.";
            document.getElementById("cpCurrent").classList.add("input-error");
            shake("cpCurrent");
            valid = false;
        }
        if (newPwd.length < 4) {
            document.getElementById("errConfirm").textContent = "New password must be at least 4 characters.";
            document.getElementById("cpNew").classList.add("input-error");
            valid = false;
        }
        if (newPwd && newPwd !== confirm) {
            document.getElementById("errConfirm").textContent = "Passwords don't match.";
            document.getElementById("cpConfirm").classList.add("input-error");
            shake("cpConfirm");
            valid = false;
        }
        if (!valid) return;

        // Save
        localStorage.setItem("adminPwd_" + activeCanteen, newPwd);

        // Show success
        var canteenName = activeCanteen === "MRC" ? "MRC Canteen" : "Khuksi Corner";
        document.getElementById("successMsg").textContent = canteenName + " password changed. You can now log in with your new password.";
        document.getElementById("formSection").style.display = "none";
        document.getElementById("successSection").classList.add("show");
    }

    function shake(id) {
        var el = document.getElementById(id);
        el.style.animation = "none";
        void el.offsetWidth;
        el.style.animation = "shake 0.28s ease";
        setTimeout(function(){ el.style.animation = ""; }, 400);
    }

    function toggleVis(id, btn) {
        var el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
        btn.textContent = el.type === "password" ? "👁" : "🙈";
    }

    // ── Security Question ─────────────────────────────────────
    var DEFAULT_QUESTIONS = {
        MRC:    "What is the secret code set by your canteen manager?",
        Khuksi: "What is the secret code set by your canteen manager?"
    };

    function loadCurrentSQ() {
        var q = localStorage.getItem("adminSecQuestion_" + activeCanteen) || DEFAULT_QUESTIONS[activeCanteen];
        var el = document.getElementById("sqCurrentText");
        if (el) el.textContent = q;
    }

    function saveSecurityQuestion() {
        var q   = document.getElementById("sqQuestion").value.trim();
        var a   = document.getElementById("sqAnswer").value.trim();
        var err = document.getElementById("sqErr");
        var suc = document.getElementById("sqSuccess");
        err.textContent = "";
        suc.textContent = "";

        if (!q) { err.textContent = "Please enter a security question."; return; }
        if (!a) { err.textContent = "Please enter an answer."; return; }
        if (a.length < 2) { err.textContent = "Answer is too short."; return; }

        localStorage.setItem("adminSecQuestion_" + activeCanteen, q);
        localStorage.setItem("adminSecAnswer_"   + activeCanteen, a.toLowerCase().trim());

        suc.textContent = "✅ Security question saved!";
        document.getElementById("sqQuestion").value = "";
        document.getElementById("sqAnswer").value   = "";
        loadCurrentSQ();
        setTimeout(function(){ suc.textContent = ""; }, 3000);
    }

    // ── Theme ─────────────────────────────────────────────────
    function toggleTheme() {
        document.body.classList.toggle("dark");
        var dark = document.body.classList.contains("dark");
        localStorage.setItem("adminTheme", dark ? "dark" : "light");
        document.getElementById("themeBtn").textContent = dark ? "🌙" : "☀️";
    }
    if (localStorage.getItem("adminTheme") === "dark") document.getElementById("themeBtn").textContent = "🌙";

    // ── Enter key ─────────────────────────────────────────────
    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") savePassword();
    });

    // ── Init ──────────────────────────────────────────────────
    switchCanteen(activeCanteen);
</script>
</body>
</html>
